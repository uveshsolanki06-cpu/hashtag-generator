<!DOCTYPE html>
<html>
<head>
<title>Hashtag Generator</title>
<style>
body {font-family: Arial; text-align:center; padding:40px; background:#f2f2f2;}
input {padding:10px; width:250px;}
button {padding:10px 20px; cursor:pointer;}
#result {margin-top:20px; font-weight:bold;}
</style>
</head>
<body>

<h1>🔥 Viral Hashtag Generator</h1>

<input type="text" id="keyword" placeholder="Enter keyword">
<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
function generate() {
    var word = document.getElementById("keyword").value;
    
    if(word == "") {
        alert("Please enter a word");
        return;
    }

    var hashtags = "";
    for(var i=1; i<=20; i++){
        hashtags += "#" + word + i + " ";
    }

    document.getElementById("result").innerText = hashtags;
}
</script>

</body>
</html>
