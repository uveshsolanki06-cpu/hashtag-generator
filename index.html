<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Hashtag Generator Pro</title>

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
padding:60px 20px;
max-width:900px;
margin:auto;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:30px;
}

.input-box{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

input, select{
padding:12px 18px;
border-radius:30px;
border:none;
outline:none;
font-size:16px;
}

button{
padding:12px 25px;
border-radius:30px;
border:none;
background:linear-gradient(135deg,#ff9966,#ff5e62);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:40px;
background:rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
padding:25px;
border-radius:20px;
min-height:120px;
}

.tag{
display:inline-block;
background:white;
color:#333;
padding:6px 12px;
margin:5px;
border-radius:20px;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Viral Hashtag Generator PRO</h1>
<p class="subtitle">Premium smart hashtag generator for all countries</p>

<div class="input-box">
<input type="text" id="keyword" placeholder="Enter keyword">

<select id="country">
<option value="global">🌍 Global</option>
<option value="india">🇮🇳 India</option>
<option value="usa">🇺🇸 USA</option>
<option value="uk">🇬🇧 UK</option>
<option value="germany">🇩🇪 Germany</option>
<option value="brazil">🇧🇷 Brazil</option>
</select>

<select id="language">
<option value="english">English</option>
<option value="hindi">Hindi</option>
<option value="spanish">Spanish</option>
<option value="german">German</option>
<option value="portuguese">Portuguese</option>
</select>

<button onclick="generate()">Generate</button>
</div>

<div class="result" id="result"></div>

</div>

<script>

const viralBase = [
"viral","trending","explore","fyp","reels",
"instagood","photooftheday","love","instadaily",
"likeforlikes","followforfollow","success","motivation",
"business","lifestyle","fashion","fitness","travel","food"
];

const countryTags = {
india:["india","desi","indiagram","madeinindia","hindustan"],
usa:["usa","america","usatrending","california","newyork"],
uk:["uk","london","british","uktrending"],
germany:["germany","berlin","deutschland"],
brazil:["brazil","brasil","riodejaneiro"],
global:["worldwide","global","international"]
};

const languageTags = {
hindi:["pyaar","dosti","zindagi","bharat"],
spanish:["amor","vida","exito"],
german:["liebe","leben","erfolg"],
portuguese:["amor","vida","sucesso"],
english:[]
};

function randomize(arr){
return arr.sort(()=>0.5-Math.random());
}

function generate(){

let word = document.getElementById("keyword").value.toLowerCase();
let country = document.getElementById("country").value;
let language = document.getElementById("language").value;
let resultBox = document.getElementById("result");

if(word===""){
alert("Enter keyword");
return;
}

let tags = [];

tags.push(word);
tags.push(word+"life");
tags.push("best"+word);
tags.push(word+"vibes");
tags.push(word+"lover");

tags = tags.concat(viralBase);
tags = tags.concat(countryTags[country]);
tags = tags.concat(languageTags[language]);

tags = randomize(tags);

tags = tags.slice(0,30);

resultBox.innerHTML="";

tags.forEach(t=>{
resultBox.innerHTML += `<span class="tag">#${t}</span>`;
});

}

</script>

</body>
</html>
