<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Hashtag Generator Pro</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
padding:60px 20px;
max-width:1000px;
margin:auto;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:30px;
}

.input-box{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

input, select{
padding:12px 18px;
border-radius:30px;
border:none;
outline:none;
font-size:16px;
}

button{
padding:12px 25px;
border-radius:30px;
border:none;
background:linear-gradient(135deg,#ff9966,#ff5e62);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:40px;
background:rgba(255,255,255,0.1);
backdrop-filter: blur(15px);
padding:25px;
border-radius:20px;
min-height:150px;
}

.tag{
display:inline-block;
background:white;
color:#333;
padding:8px 14px;
margin:6px;
border-radius:25px;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

.tag:hover{
background:#ff9966;
color:white;
}

.copy-btn{
background:linear-gradient(135deg,#00c6ff,#0072ff);
margin-bottom:15px;
}

#copyMsg{
margin-left:10px;
color:#00ffcc;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Viral Hashtag Generator PRO</h1>
<p class="subtitle">Smart premium hashtag tool for all countries & languages</p>

<div class="input-box">
<input type="text" id="keyword" placeholder="Enter keyword">

<select id="country">
<option value="global">🌍 Global</option>
<option value="india">🇮🇳 India</option>
<option value="usa">🇺🇸 USA</option>
<option value="uk">🇬🇧 UK</option>
<option value="germany">🇩🇪 Germany</option>
<option value="brazil">🇧🇷 Brazil</option>
</select>

<select id="language">
<option value="english">English</option>
<option value="hindi">Hindi</option>
<option value="spanish">Spanish</option>
<option value="german">German</option>
<option value="portuguese">Portuguese</option>
</select>

<button onclick="generate()">Generate</button>
</div>

<div class="result">
<div>
<button class="copy-btn" onclick="copyAll()">📋 Copy All Hashtags</button>
<span id="copyMsg"></span>
</div>
<div id="result"></div>
</div>

</div>

<script>

const viralBase = [
"viral","trending","explorepage","fyp","reels",
"instagood","photooftheday","love","instadaily",
"likeforlikes","followforfollow","success",
"motivation","business","lifestyle","fashion",
"fitness","travel","food","entrepreneur",
"socialmedia","digitalmarketing","contentcreator"
];

const countryTags = {
india:["india","desi","indiagram","madeinindia","hindustan"],
usa:["usa","america","usatrending","california","newyork"],
uk:["uk","london","british","uktrending"],
germany:["germany","berlin","deutschland"],
brazil:["brazil","brasil","riodejaneiro"],
global:["worldwide","global","international"]
};

const languageTags = {
hindi:["pyaar","dosti","zindagi","bharat"],
spanish:["amor","vida","exito"],
german:["liebe","leben","erfolg"],
portuguese:["amor","vida","sucesso"],
english:[]
};

function randomize(arr){
return arr.sort(()=>0.5-Math.random());
}

function generate(){

let word = document.getElementById("keyword").value.toLowerCase();
let country = document.getElementById("country").value;
let language = document.getElementById("language").value;
let resultBox = document.getElementById("result");

if(word===""){
alert("Enter keyword");
return;
}

let tags = [];

tags.push(word);
tags.push(word+"life");
tags.push(word+"lover");
tags.push(word+"vibes");
tags.push("best"+word);
tags.push("top"+word);
tags.push(word+"goals");
tags.push(word+"official");

tags = tags.concat(viralBase);
tags = tags.concat(countryTags[country]);
tags = tags.concat(languageTags[language]);

tags = [...new Set(tags)];
tags = randomize(tags);
tags = tags.slice(0,35);

resultBox.innerHTML="";

tags.forEach(t=>{
resultBox.innerHTML += `<span class="tag" onclick="copyTag(this)">#${t}</span>`;
});

}

function copyAll(){

let tags = document.querySelectorAll(".tag");
let text="";

tags.forEach(tag=>{
text += tag.innerText + " ";
});

navigator.clipboard.writeText(text).then(()=>{
document.getElementById("copyMsg").innerText="✅ Copied!";
setTimeout(()=>{
document.getElementById("copyMsg").innerText="";
},2000);
});

}

function copyTag(element){
navigator.clipboard.writeText(element.innerText);
element.style.background="#00ffcc";
element.style.color="black";
setTimeout(()=>{
element.style.background="white";
element.style.color="#333";
},500);
}

</script>

</body>
</html>
